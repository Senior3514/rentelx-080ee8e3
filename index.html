    <!-- Preload font connections -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Prevent RTL/LTR flash and dark-mode flicker:
      read stored preferences before React mounts and apply immediately.
    -->
    <script>
      (function () {
        try {
          var lang = localStorage.getItem('rentelx-lang');
          if (lang === 'he') {
            document.documentElement.lang = 'he';
            document.documentElement.dir = 'rtl';
          }
          var theme = localStorage.getItem('rentelx-theme');
          var isDark =
            theme === 'dark' ||
            ((!theme || theme === 'system') &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
